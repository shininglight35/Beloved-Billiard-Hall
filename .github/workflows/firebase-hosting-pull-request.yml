name: Test on Pull Request
on: pull_request

jobs:
  test_only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      
      - name: Run Tests
        id: run_tests
        run: npm test > error-logs.txt 2>&1

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PR-Error-Logs
          path: error-logs.txt
          retention-days: 7
