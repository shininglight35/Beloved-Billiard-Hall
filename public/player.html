<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Website - Beloved Billiard Hall</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glow-green {
            box-shadow: 0 0 30px rgba(16, 185, 129, .3);
        }

        .table-card {
            transition: all .2s ease;
            cursor: pointer;
        }

        .table-card:hover {
            transform: scale(1.05);
        }

        select option {
            color: #000000;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center 
    bg-gradient-to-br from-slate-900 via-emerald-950 to-slate-900 
    text-white px-4 sm:px-6 lg:px-8 py-6 sm:py-10">

    <div class="w-full max-w-7xl mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-emerald-200 bg-clip-text text-transparent">
                Player Booking
            </h1>
            <button id="logoutBtn" class="px-4 py-2 bg-rose-500 rounded-lg hover:opacity-90">
                Logout
            </button>
        </div>

        <!-- Booking Form -->
        <div class="bg-white/5 p-4 sm:p-6 lg:p-8 rounded-2xl border border-white/10 mb-8">

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

                <div>
                    <label class="text-base sm:text-lg lg:text-base text-slate-300">Select Table</label>
                    <select id="tableNumber"
                        class="w-full mt-2 px-4 py-3 text-base md:text-lg lg:text-base rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="1">Table 1</option>
                        <option value="2">Table 2</option>
                        <option value="3">Table 3</option>
                        <option value="4">Table 4</option>
                        <option value="5">Table 5</option>
                        <option value="6">Table 6</option>
                        <option value="7">Table 7</option>
                    </select>
                </div>

                <div>
                    <label class="text-base sm:text-lg lg:text-base text-slate-300">Date</label>
                    <input type="date" id="bookingDate"
                        class="w-full mt-2 px-4 py-3 text-base md:text-lg lg:text-base rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <div>
                    <label class="text-base sm:text-lg lg:text-base text-slate-300">Start Time</label>
                    <input type="time" id="startTime"
                        class="w-full mt-2 px-4 py-3 text-base md:text-lg lg:text-base rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>

                <div>
                    <label class="text-base sm:text-lg lg:text-base text-slate-300">Duration (minutes)</label>
                    <input type="number" id="duration" min="30" step="30" placeholder="Enter minutes"
                        class="w-full mt-2 px-4 py-3 text-base md:text-lg lg:text-base rounded-lg bg-white/5 border border-white/10 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <button id="bookBtn"
                class="mt-6 w-full py-3 md:py-4 text-base md:text-lg bg-emerald-500 rounded-xl font-semibold hover:opacity-90 transition">
                Book Table
            </button>

            <div id="priceDisplay" class="mt-4 text-center text-emerald-300 font-semibold text-lg">
                Total: ₱100
            </div>

            <div id="message" class="hidden mt-4 p-3 rounded-lg text-sm font-medium"></div>
        </div>

        <!-- Table Status Grid -->
        <div class="mb-8">
            <h2 class="text-xl font-semibold mb-4">Table Status</h2>
            <div id="tableGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4">
            </div>
        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, serverTimestamp, doc, getDoc }
            from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbfsXV9Sm6I4gxJVPkbuXwkYJ2VORf_bU",
            authDomain: "billiard-9b764.firebaseapp.com",
            projectId: "billiard-9b764",
            storageBucket: "billiard-9b764.firebasestorage.app",
            messagingSenderId: "374402466086",
            appId: "1:374402466086:web:7238af05e4f448d53201e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const bookBtn = document.getElementById("bookBtn");
        const bookingList = document.getElementById("bookingList");
        const message = document.getElementById("message");

        const tableNumber = document.getElementById("tableNumber");
        const bookingDate = document.getElementById("bookingDate");
        const startTime = document.getElementById("startTime");
        const duration = document.getElementById("duration");

        let currentUser = null;
        let totalPrice = 100;
        let playerName = "";

        function setDefaultDateTime() {
            const now = new Date();

            // Format date YYYY-MM-DD
            const today = now.toISOString().split("T")[0];
            bookingDate.value = today;

            // Format time HH:MM
            const hoursNow = String(now.getHours()).padStart(2, "0");
            const minutesNow = String(now.getMinutes()).padStart(2, "0");
            startTime.value = `${hoursNow}:${minutesNow}`;

            // Default duration 60 minutes
            duration.value = 60;
        }

        const priceDisplay = document.getElementById("priceDisplay");

        function updatePrice() {
            let minutes = parseInt(duration.value);

            if (isNaN(minutes) || minutes < 30) {
                minutes = 30;
            }

            const pricePer30Min = 50;
            const blocks = Math.ceil(minutes / 30);
            totalPrice = blocks * pricePer30Min;

            priceDisplay.textContent = `Total: ₱${totalPrice}`;
        }

        onAuthStateChanged(auth, async user => {

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            currentUser = user;

            // GET USER DATA FROM FIRESTORE
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const userData = userSnap.data();
                playerName = userData.name;
            }

            setDefaultDateTime();
            updatePrice();
            renderTables();
            loadBookings();
            updateTableStatus();
        });

        /* Logout */
        document.getElementById("logoutBtn").onclick = async () => {
            await signOut(auth);
            window.location.href = "index.html";
        };

        /* Render Table Rectangles */
        function renderTables() {
            const tableGrid = document.getElementById("tableGrid");
            tableGrid.innerHTML = "";

            for (let i = 1; i <= 7; i++) {
                const div = document.createElement("div");
                div.id = `table-${i}`;
                div.className = "table-card aspect-square rounded-2xl flex flex-col items-center justify-center bg-emerald-500/20 border border-emerald-400 text-center p-4 transition-all";
                div.innerHTML = `<div class="flex flex-col items-center justify-center gap-2">
                    <span class="text-lg font-semibold">Table ${i}</span>
                    <span class="text-sm opacity-80">Free</span>
                    </div>`;

                div.onclick = () => {
                    tableNumber.value = i;
                };

                tableGrid.appendChild(div);
            }
        }

        /* Update Availability */
        async function updateTableStatus() {

            if (!bookingDate.value || !startTime.value) return;

            const selectedStart = new Date(`${bookingDate.value}T${startTime.value}`);
            const selectedEnd = new Date(selectedStart.getTime() + duration.value * 60 * 1000);

            const q = query(collection(db, "bookings"), where("date", "==", bookingDate.value), where("status", "==", "approved"));
            const snapshot = await getDocs(q);

            renderTables();

            snapshot.forEach(doc => {
                const data = doc.data();
                const existingStart = new Date(data.start);
                const existingEnd = new Date(data.end);

                if (selectedStart < existingEnd && selectedEnd > existingStart) {
                    const tableDiv = document.getElementById(`table-${data.table}`);
                    tableDiv.className = "table-card min-h-[100px] sm:min-h-[110px] md:min-h-[120px] rounded-xl flex items-center justify-center bg-rose-500/20 border border-rose-400 text-center p-2";

                    const availableTime = existingEnd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    tableDiv.innerHTML = `<div class="flex flex-col items-center justify-center gap-1">
                        <span class="text-lg font-semibold">Table ${data.table}</span>
                        <span class="text-sm text-rose-300">Booked</span>
                        <span class="text-xs opacity-80">Available at ${availableTime}</span>
                        </div>`;
                }
            });
        }

        /* Show Message */
        function showMessage(text, type = "error") {
            message.textContent = text;
            message.className = "mt-4 p-3 rounded-lg text-sm font-medium";
            message.classList.add(type === "error" ? "bg-rose-500/20" : "bg-emerald-500/20");
        }

        /* Book Table */
        bookBtn.onclick = async () => {

            updatePrice();

            if (!bookingDate.value || !startTime.value) {
                showMessage("Please fill all fields.");
                return;
            }

            const start = new Date(`${bookingDate.value}T${startTime.value}`);
            const end = new Date(start.getTime() + duration.value * 60 * 1000);

            const q = query(
                collection(db, "bookings"),
                where("table", "==", tableNumber.value),
                where("date", "==", bookingDate.value),
                where("status", "==", "approved")
            );

            const snapshot = await getDocs(q);
            let conflict = false;

            snapshot.forEach(doc => {
                const data = doc.data();
                const existingStart = new Date(data.start);
                const existingEnd = new Date(data.end);

                if (start < existingEnd && end > existingStart) conflict = true;
            });

            if (conflict) {
                showMessage("Time slot already booked.");
                return;
            }

            await addDoc(collection(db, "bookings"), {
                userName: playerName,
                userId: currentUser.uid,
                table: tableNumber.value,
                date: bookingDate.value,
                start: start.toISOString(),
                end: end.toISOString(),
                price: totalPrice,
                status: "pending",
                createdAt: serverTimestamp()
            });
            const finishTime = end.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            showMessage(`Waiting for the booking request to be accepted...`, "success");
            updateTableStatus();
            loadBookings();
        };

        /* Load My Bookings */
        async function loadBookings() {

            bookingList.innerHTML = "";

            const q = query(
                collection(db, "bookings"),
                where("userId", "==", currentUser.uid),
                orderBy("createdAt", "desc")
            );

            const snapshot = await getDocs(q);

            snapshot.forEach(doc => {
                const data = doc.data();

                const div = document.createElement("div");
                div.className = "p-4 bg-white/5 rounded-lg border border-white/10";

                div.innerHTML = `
        <p><strong>Table:</strong> ${data.table}</p>
        <p><strong>Date:</strong> ${data.date}</p>
        <p><strong>Start:</strong> ${new Date(data.start).toLocaleTimeString()}</p>
        <p><strong>End:</strong> ${new Date(data.end).toLocaleTimeString()}</p>
        `;

                bookingList.appendChild(div);
            });
        }

        /* Auto Update */
        bookingDate.addEventListener("change", updateTableStatus);
        startTime.addEventListener("change", updateTableStatus);
        duration.addEventListener("input", updateTableStatus);
        duration.addEventListener("input", updatePrice);

    </script>
</body>

</html>
